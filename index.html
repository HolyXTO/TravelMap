<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="两个人的个人足迹地图：按国家、省州、城市记录旅行经历。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>TravelMap | 足迹地图</title>
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.right = '0';
        div.style.backgroundColor = '#ef4444';
        div.style.color = 'white';
        div.style.padding = '16px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.style.fontSize = '14px';
        div.innerText = '⚠️ 网页加载出错了:\n' + message + '\n\n来源: ' + source + ' (行号: ' + lineno + ', 列号: ' + colno + ')' + (error && error.stack ? '\n\n堆栈信息:\n' + error.stack : '');
        document.body.appendChild(div);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
